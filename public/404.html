<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Oneput AI</title>
    <!-- spa-github-pages: stash the requested path and bounce to index.html.
         pathSegmentsToKeep = 1 keeps the repo name (/oneput-ai-mvp-v1/) in the base. -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
